{% extends "base.html" %}

{% block content %}
<article class="detail-card">
    <header>
        <h2>{{ item.name }}</h2>
        <span class="chip">{{ item.category.value }}</span>
    </header>
    {% if item.image_url %}
        <img class="preview-image" src="{{ item.image_url }}" alt="{{ item.name }}">
    {% endif %}
    <dl>
        <dt>Color</dt>
        <dd>{{ item.color or "n/a" }}</dd>
        <dt>Size</dt>
        <dd>{{ item.size or "n/a" }}</dd>
        <dt>Description</dt>
        <dd>{{ item.description or "n/a" }}</dd>
    </dl>
    <section class="detail-actions">
        <a class="button" href="/clothes/{{ item.id }}/edit">Edit</a>
        <form method="post" action="/clothes/{{ item.id }}/delete" onsubmit="return confirm('Delete this garment?');">
            <button class="button danger" type="submit">Delete</button>
        </form>
    </section>
    <a href="/clothes">&larr; Back to catalog</a>
</article>
{% endblock %}
