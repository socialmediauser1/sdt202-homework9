{% extends "base.html" %}

{% block content %}
<section class="form-card">
    <h2>{{ page_title }}</h2>
    <form method="post" action="{{ action }}">
        <label>
            Name
            <input type="text" name="name" value="{{ form_values.get('name', '') }}">
            {% if errors.get('name') %}<small class="error">{{ errors.get('name') }}</small>{% endif %}
        </label>
        <label>
            Category
            <select name="category">
                <option value="">Select one</option>
                {% for value, label in category_options %}
                    <option value="{{ value }}" {% if form_values.get('category') == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
            {% if errors.get('category') %}<small class="error">{{ errors.get('category') }}</small>{% endif %}
        </label>
        <label>
            Color
            <input type="text" name="color" value="{{ form_values.get('color', '') }}">
            {% if errors.get('color') %}<small class="error">{{ errors.get('color') }}</small>{% endif %}
        </label>
        <label>
            Size
            <input type="text" name="size" value="{{ form_values.get('size', '') }}">
            {% if errors.get('size') %}<small class="error">{{ errors.get('size') }}</small>{% endif %}
        </label>
        <label>
            Description
            <textarea name="description" rows="4">{{ form_values.get('description', '') }}</textarea>
            {% if errors.get('description') %}<small class="error">{{ errors.get('description') }}</small>{% endif %}
        </label>
        <label>
            Reference Image URL
            <input type="url" name="image_url" value="{{ form_values.get('image_url', '') }}">
            {% if errors.get('image_url') %}<small class="error">{{ errors.get('image_url') }}</small>{% endif %}
        </label>
        <button class="button primary" type="submit">Save</button>
    </form>
</section>
{% endblock %}
